name: Bug Report
description: Report a reproducible bug in API, docs, or demo.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please provide enough detail for us to reproduce and verify the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Step-by-step instructions to reproduce.
      placeholder: |
        1. Go to ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happened?
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS / Python version / runtime details
      placeholder: Windows 10, Python 3.11, etc.
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste relevant logs or screenshots.
